<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="EvenKar">
  <defs>
    <linearGradient id="eu-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a93f0" />
      <stop offset="1" stop-color="#1565c0" />
    </linearGradient>
  </defs>
  <!-- Rounded app square -->
  <rect width="512" height="512" rx="112" fill="url(#eu-bg)" />
  <!-- "Up" chevron over an equals sign: even things up -->
  <polyline points="150,215 256,130 362,215" fill="none" stroke="#ffffff"
    stroke-width="46" stroke-linecap="round" stroke-linejoin="round" />
  <rect x="150" y="285" width="212" height="44" rx="22" fill="#ffffff" />
  <rect x="150" y="357" width="212" height="44" rx="22" fill="#ffffff" />
</svg>
