version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      # Keep react and react-dom together — they must upgrade in lockstep.
      react:
        patterns:
          - react
          - react-dom
      dev-dependencies:
        dependency-type: development
    ignore:
      # Auto-PR only minor/patch updates; major bumps (React 19, Vite 8,
      # Vitest 4, the eslint ecosystem, …) are deliberate manual migrations.
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
